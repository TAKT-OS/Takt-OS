# GitHub Pages — https://takt-os.github.io/Takt-OS/
# Deploy: GitHub Actions workflow .github/workflows/pages.yml

title: TAKT OS
description: Industrial cycle-based RTOS for ESP32 — takt scheduler, Modbus, MQTT, OTA
version: "0.2.3"

url: https://takt-os.github.io
baseurl: /Takt-OS

repo_url: https://github.com/TAKT-OS/Takt-OS
issues_url: https://github.com/TAKT-OS/Takt-OS/issues
releases_url: https://github.com/TAKT-OS/Takt-OS/releases

markdown: GFM
permalink: pretty

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

relative_links:
  enabled: true
  collections: true

exclude:
  - wiki
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md

defaults:
  - scope:
      path: ""
    values:
      layout: default

nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /developer_guide/
  - title: PlatformIO / VS Code
    url: /platformio_vscode/
  - title: Architecture
    url: /architecture/
  - title: Scheduler
    url: /scheduler/
  - title: Event Bus
    url: /event_bus/
  - title: Memory & NVS
    url: /memory/
  - title: Bootloader
    url: /bootloader/
  - title: Recovery / OTA
    url: /recovery/
  - title: API Reference
    url: /api_reference/
  - title: UML Diagrams
    url: /uml/diagrams/
  - title: Components
    url: /components/kernel/
  - title: FAQ
    url: /faq/
  - title: Licensing
    url: /licensing/
  - title: Releases
    url: https://github.com/TAKT-OS/Takt-OS/releases
    external: true
