<link rel="icon" href="{{ site.baseurl }}/assets/takt-os-icon.svg" type="image/svg+xml">
<style>
  .page-header { padding: 2.5rem 1rem; }
  .page-header h1 { font-size: 2.25rem; letter-spacing: 0.04em; }
  .project-tagline { max-width: 42rem; margin: 0.75rem auto 0; font-size: 1.05rem; opacity: 0.92; }
  .main-content { max-width: 64rem; line-height: 1.65; }
  .main-content table { display: table; width: 100%; }
  .main-content pre { overflow-x: auto; }
  .docs-hero { text-align: center; margin: 0 0 1.5rem; }
  .docs-hero img { max-width: 100%; height: auto; border-radius: 12px; }
  .docs-nav { margin: 1rem 0 1.5rem; font-size: 0.95rem; }
  .mermaid { text-align: center; margin: 1.25rem 0; overflow-x: auto; }
</style>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('pre > code.language-mermaid, pre > code.mermaid').forEach(function (code) {
      var pre = code.parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = code.textContent;
      pre.replaceWith(div);
    });
    if (window.mermaid) {
      mermaid.initialize({ startOnLoad: true, theme: 'dark', securityLevel: 'loose' });
    }
  });
</script>
