name: TAKT OS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  host-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure
        run: cmake -B build -DTAKT_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build -j

  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure tests
        working-directory: tests
        run: cmake -B build

      - name: Build tests
        working-directory: tests
        run: cmake --build build -j

      - name: Run tests
        working-directory: tests
        run: ctest --test-dir build --output-on-failure

  esp32-build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.2
    steps:
      - uses: actions/checkout@v6

      - name: Build demo_controller
        run: |
          . $IDF_PATH/export.sh
          cd examples/demo_controller
          idf.py set-target esp32
          idf.py build

      - name: Build recovery_app
        run: |
          . $IDF_PATH/export.sh
          cd examples/recovery_app
          idf.py set-target esp32
          idf.py build
